<!DOCTYPE html>
<html>
<head>
  <title>Rename Files Tool</title>

  <!-- ZIP -->
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

  <!-- Download -->
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

  <link rel="stylesheet" href="../css/style.css">
</head>

<body class="tool-page">

<header>
  <h1>Rename Files Tool</h1>
</header>

<div class="container">

  <div class="card">

    <label>Select files</label>
    <input type="file" id="files" multiple>

    <label>Prefix</label>
    <input type="text" id="prefix" placeholder="e.g. file">

    <button onclick="renameFiles()">Rename & Download ZIP</button>

    <ul id="preview"></ul>

  </div>

</div>

<script>
async function renameFiles() {

  // Check available files
  if (files.length === 0) {
  alert("Please upload files");
  return;
  }

  // Catch selected files
  const files = document.getElementById('files').files;

  // Catch written prefix
  const prefix = document.getElementById('prefix').value;

  if (!prefix) {
    alert("Please enter a prefix");
    return;
  }

  // Create new zip
  const zip = new JSZip();

  // Preview zone
  const preview = document.getElementById('preview');
  preview.innerHTML = "";

  for (let i = 0; i < files.length; i++) {

    const file = files[i];

    // Get extension (.jpg, .png...)
    const extension = file.name.split('.').pop();

    // New name
    const newName = `${prefix}_${i+1}.${extension}`;

    // Preview
    const li = document.createElement("li");
    li.textContent = file.name + " → " + newName;
    preview.appendChild(li);

    // Read file content
    const content = await file.arrayBuffer();

    // New zip with content
    zip.file(newName, content);
  }

  // Final zip
  const zipBlob = await zip.generateAsync({ type: "blob" });

  // Download zip
  saveAs(zipBlob, "renamed_files.zip");
}
</script>

</body>
</html>
