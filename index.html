<!DOCTYPE html>
<html>
<head>
  <title>NBN Tools</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="home">

<div class="logo">NBN Tools </div>

<div class="container">

  <!-- Rename Files Tool -->
  <div class="tool">
    <div class="tool-left">
      <h2>Rename Files Tool</h2>
      <p>Rename multiple files instantly.</p>
      <a class="button" href="tools/rename-files/">
        <span>Open Tool</span>
      </a>
    </div>

    <div class="tool-right">
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </div>
  </div>

  <!-- Image Converter Tool -->
  <div class="tool">
    <div class="tool-left">
      <h2>Image Converter</h2>
      <p>Convert images to JPG, PNG or WEBP.</p>
      <a class="button" href="tools/image-converter/">
        <span>Open Tool</span>
      </a>
    </div>

    <div class="converter-visual">
      <div class="format-box">JPG</div>
      <div class="arrow">
        <svg width="14" height="14" viewBox="0 0 24 24">
          <path d="M5 12h14M13 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="format-box active">PNG</div>
      <div class="arrow">
        <svg width="14" height="14" viewBox="0 0 24 24">
          <path d="M5 12h14M13 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="format-box">WEBP</div>
    </div>
  </div>

</div>

</body>
</html>
